name: Security Release Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  discover-services:
    name: Discover services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.list.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        name: List services/*
        run: |
          svcs=$(ls -1 services 2>/dev/null | jq -R . | jq -sc .)
          echo "services=$svcs" >> "$GITHUB_OUTPUT"

  test-service:
    name: ${{ matrix.service }}
    needs: discover-services
    if: ${{ needs.discover-services.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover-services.outputs.services) }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build container image
        working-directory: services/${{ matrix.service }}
        run: |
          docker build -t mt-sandbox-${{ matrix.service }}:test .

      - name: Inspect image labels
        run: |
          docker inspect mt-sandbox-${{ matrix.service }}:test \
            --format '{{ json .Config.Labels }}' | jq . || true

      - name: Detect container listen port
        id: port
        working-directory: services/${{ matrix.service }}
        run: |
          # Pull the port from EXPOSE in the Dockerfile; default to 8080.
          P=$(grep -i '^EXPOSE' Dockerfile 2>/dev/null | awk '{print $2}' | head -n1)
          P=${P:-8080}
          echo "container_port=$P" >> "$GITHUB_OUTPUT"
          echo "Container listens on port: $P"

      - name: Start container
        run: |
          docker run -d --rm \
            --name mt-${{ matrix.service }} \
            -p 8080:${{ steps.port.outputs.container_port }} \
            mt-sandbox-${{ matrix.service }}:test
          sleep 2
          docker ps --filter "name=mt-${{ matrix.service }}"

      - name: Health probe — service responds within 20s
        run: |
          set -e
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null --max-time 3 http://localhost:8080/; then
              echo "Service responded on attempt $i"
              exit 0
            fi
            sleep 1
          done
          echo "Service did not respond within 20s"
          docker logs mt-${{ matrix.service }} || true
          exit 1

      - name: HTTP 200 on root endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8080/)
          echo "Status code: $STATUS"
          test "$STATUS" = "200"

      - name: Response body served correctly
        run: |
          BODY=$(curl -s --max-time 5 http://localhost:8080/)
          echo "$BODY" | head -10
          # Accept any non-empty body — just verifies content is being served
          test -n "$BODY"

      - name: Security headers — Content-Type is set
        run: |
          curl -sI --max-time 5 http://localhost:8080/ | tee /tmp/headers
          grep -qi "^content-type:" /tmp/headers

      - name: Response time under 1s SLA
        run: |
          T=$(curl -s -o /dev/null -w "%{time_total}" --max-time 5 http://localhost:8080/)
          echo "Total response time: ${T}s"
          awk -v t="$T" 'BEGIN { exit !(t < 1.0) }'

      - name: Path traversal probe — no /etc/passwd leak
        run: |
          OUT=$(curl -s --max-time 5 "http://localhost:8080/../../../etc/passwd" || true)
          if echo "$OUT" | grep -q "root:x:0"; then
            echo "LEAK: server returned /etc/passwd content"
            exit 1
          fi
          echo "Traversal probe safe — no shadow file content in response."

      - name: Custom smoke test (if present)
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f tests/smoke_test.sh ]; then
            chmod +x tests/smoke_test.sh
            ./tests/smoke_test.sh
          else
            echo "No service-specific smoke test"
          fi

      - name: Capture container logs
        if: always()
        run: |
          docker logs mt-${{ matrix.service }} 2>&1 | tail -50 || true

      - name: Stop container
        if: always()
        run: |
          docker stop mt-${{ matrix.service }} 2>/dev/null || true
