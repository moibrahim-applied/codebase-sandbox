# Security baseline applied to every response.
# Mapped to IEC 62443-4-1 SD-3 (secure-by-default).

add_header X-Frame-Options          "SAMEORIGIN"            always;
add_header X-Content-Type-Options   "nosniff"               always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
# HSTS is a no-op on plaintext, but ensures upstreams behind TLS terminators stay HTTPS-only.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# Hide nginx version from error pages (already covered by server_tokens off).
proxy_hide_header X-Powered-By;
