# Security baseline applied to every response.
# Mapped to IEC 62443-4-1 SD-3 (secure-by-default).
# Updated alongside CVE-2022-41741 remediation (nginx 1.22.1) to tighten
# response-header posture per GWP secure-design review 2022-10.

add_header X-Frame-Options          "SAMEORIGIN"            always;
add_header X-Content-Type-Options   "nosniff"               always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
# HSTS is a no-op on plaintext, but ensures upstreams behind TLS terminators stay HTTPS-only.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
# CSP: restricts executable content to same-origin only; no media sources permitted —
# defence-in-depth against any future media-parsing (cf. CVE-2022-41741) from the browser side.
add_header Content-Security-Policy  "default-src 'self'; media-src 'none'; object-src 'none'; frame-ancestors 'self'" always;

# Hide nginx version from error pages (already covered by server_tokens off).
proxy_hide_header X-Powered-By;
