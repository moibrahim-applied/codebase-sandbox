# Security baseline applied to every response.
# Mapped to IEC 62443-4-1 SD-3 (secure-by-default).
# CVE-2021-23017 is addressed by the nginx:1.20.1 base image pin (Dockerfile)
# and resolver hardening (nginx.conf). This file provides defence-in-depth for
# response-layer controls and is not the primary remediation for that CVE.

add_header X-Frame-Options          "SAMEORIGIN"            always;
add_header X-Content-Type-Options   "nosniff"               always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
# HSTS is a no-op on plaintext, but ensures upstreams behind TLS terminators stay HTTPS-only.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# Hide nginx version from error pages (already covered by server_tokens off).
proxy_hide_header X-Powered-By;

# CVE-2022-41741 defence-in-depth: deny requests for MP4 media at config level.
# ngx_http_mp4_module contains an off-by-one memory corruption when processing
# crafted MP4 atom lengths (patched in nginx 1.22.1). This gateway serves no
# media; the explicit block is a safety layer independent of the binary version.
location ~* \.(mp4|m4v|m4a)$ {
  deny all;
  return 404;
}
