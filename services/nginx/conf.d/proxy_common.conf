proxy_http_version 1.1;
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   X-Request-ID      $request_id;
proxy_connect_timeout 5s;
proxy_send_timeout    10s;
proxy_read_timeout    30s;
# proxy_buffering / buffer sizes kept conservative; mp4 media responses must
# never be proxied through this gateway (CVE-2022-41741 — mp4 module heap
# corruption). If a future location block needs media passthrough, proxy_pass
# to a dedicated media origin, not through this api-gateway.
proxy_buffering on;
proxy_buffer_size  4k;
proxy_buffers      8 8k;
# Block downstream attempts to request .mp4 content through the proxy layer;
# the mp4 module must not be reachable even if accidentally enabled upstream.
proxy_hide_header  Content-Range;
