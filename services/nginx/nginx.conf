worker_processes auto;
worker_rlimit_nofile 4096;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging — ALCOA+ requires attributable, contemporaneous records.
  log_format mt_audit '$remote_addr - $remote_user [$time_iso8601] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream=$upstream_addr rt=$request_time';
  access_log /var/log/nginx/access.log mt_audit;
  error_log  /var/log/nginx/error.log warn;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  server_tokens off;

  keepalive_timeout 65;
  client_max_body_size 10M;
  client_body_timeout  12s;
  send_timeout         10s;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript;

  # ----------------------------------------------------------------------
  # DNS resolver for upstream hostnames.
  #
  # CVE-2021-23017 (patched — nginx 1.20.1): a 1-byte off-by-one heap write
  # in ngx_resolver_copy() triggered by a crafted DNS response. Attack
  # requires the resolver to be reachable by an adversary. Mitigations below:
  #   1. Base image pinned to nginx:1.20.1 (fix version) in Dockerfile.
  #   2. resolver bound to Docker's embedded DNS (127.0.0.11) only — no
  #      public or attacker-controlled resolver is reachable.
  #   3. Short valid= TTL limits the window for cache-poisoning via crafted
  #      DNS responses.
  #   4. ipv6=off reduces the AAAA record surface parsed by the resolver.
  #   5. resolver_timeout kept tight so hung DNS queries fail fast.
  # ----------------------------------------------------------------------
  resolver 127.0.0.11 valid=10s ipv6=off;   # CVE-2021-23017: short TTL, no IPv6
  resolver_timeout 3s;

  include /etc/nginx/conf.d/security.conf;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health probe (used by k8s/CI).
    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Static landing page.
    location = / {
      try_files /index.html =404;
    }

    # Proxied paths. Variable-based proxy_pass forces nginx to defer DNS
    # lookup to request time — both avoiding startup failures when an
    # upstream is briefly missing AND exercising the `resolver` code path
    # (where CVE-2021-23017 lived).
    location /api/measurement/ {
      set $upstream_measurement http://measurement-service:8000;
      proxy_pass $upstream_measurement;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
    location /api/report/ {
      set $upstream_report http://report-service:3000;
      proxy_pass $upstream_report;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
    location /api/auth/ {
      set $upstream_auth http://auth-service:8001;
      proxy_pass $upstream_auth;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
  }
}
