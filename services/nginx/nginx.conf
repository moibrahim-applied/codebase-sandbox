worker_processes auto;
worker_rlimit_nofile 4096;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging — ALCOA+ requires attributable, contemporaneous records.
  log_format mt_audit '$remote_addr - $remote_user [$time_iso8601] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream=$upstream_addr rt=$request_time';
  access_log /var/log/nginx/access.log mt_audit;
  error_log  /var/log/nginx/error.log warn;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  server_tokens off;

  keepalive_timeout 65;
  client_max_body_size 10M;
  client_body_timeout  12s;
  send_timeout         10s;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript;

  # ----------------------------------------------------------------------
  # DNS resolver for upstream hostnames.
  #
  # nginx's resolver is the code path implicated in CVE-2021-23017: a
  # 1-byte off-by-one when parsing certain DNS responses in versions
  # 0.6.18–1.20.0. Patched in 1.20.1 / 1.21.0.
  #
  # We pin to Docker's embedded DNS so upstream service discovery uses
  # the platform's resolver, not a public one.
  # ----------------------------------------------------------------------
  resolver 127.0.0.11 valid=30s ipv6=off;
  resolver_timeout 5s;

  # ----------------------------------------------------------------------
  # CVE-2022-41741 — ngx_http_mp4_module memory corruption.
  #
  # An integer truncation in the MP4 module's metadata parser (nginx
  # 1.1.3–1.22.0 and 1.23.0) allowed heap corruption via a crafted MP4
  # file, potentially enabling code execution or DoS. Remediated by
  # upgrading to nginx 1.22.1 (see Dockerfile).
  #
  # This gateway serves no media; the mp4 module is NOT loaded or enabled.
  # `load_module` directives are absent and ngx_http_mp4_module is therefore
  # inactive, providing defence-in-depth alongside the version upgrade.
  # ----------------------------------------------------------------------

  include /etc/nginx/conf.d/security.conf;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health probe (used by k8s/CI).
    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Static landing page.
    location = / {
      try_files /index.html =404;
    }

    # Proxied paths. Variable-based proxy_pass forces nginx to defer DNS
    # lookup to request time — both avoiding startup failures when an
    # upstream is briefly missing AND exercising the `resolver` code path
    # (where CVE-2021-23017 lived).
    location /api/measurement/ {
      set $upstream_measurement http://measurement-service:8000;
      proxy_pass $upstream_measurement;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
    location /api/report/ {
      set $upstream_report http://report-service:3000;
      proxy_pass $upstream_report;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
    location /api/auth/ {
      set $upstream_auth http://auth-service:8001;
      proxy_pass $upstream_auth;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
  }
}
