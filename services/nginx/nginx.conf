worker_processes auto;
worker_rlimit_nofile 4096;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging — ALCOA+ requires attributable, contemporaneous records.
  log_format mt_audit '$remote_addr - $remote_user [$time_iso8601] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream=$upstream_addr rt=$request_time';
  access_log /var/log/nginx/access.log mt_audit;
  error_log  /var/log/nginx/error.log warn;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  server_tokens off;

  keepalive_timeout 65;
  client_max_body_size 10M;
  client_body_timeout  12s;
  send_timeout         10s;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript;

  # ----------------------------------------------------------------------
  # DNS resolver for upstream hostnames.
  #
  # CVE-2021-23017 (CVSS 7.7): 1-byte off-by-one in nginx's DNS response
  # parser (versions 0.6.18–1.20.0) allowed a rogue DNS server to trigger
  # a heap buffer overflow. Fixed in nginx 1.20.1 / 1.21.0 — this image
  # is now pinned to 1.20.1.
  #
  # Defence-in-depth: we pin to Docker's embedded resolver (127.0.0.11)
  # so the gateway never queries an untrusted public DNS server, limiting
  # the attack surface even if a future parser bug surfaces.
  # resolver directive hardened for CVE-2021-23017: trusted internal DNS only, ipv6 disabled.
  # ----------------------------------------------------------------------
  resolver 127.0.0.11 valid=30s ipv6=off;
  resolver_timeout 5s;

  include /etc/nginx/conf.d/security.conf;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health probe (used by k8s/CI).
    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Static landing page.
    location = / {
      try_files /index.html =404;
    }

    # Proxied paths. Variable-based proxy_pass forces nginx to defer DNS
    # lookup to request time — both avoiding startup failures when an
    # upstream is briefly missing AND exercising the `resolver` code path
    # (CVE-2021-23017 affected this path; patched in nginx 1.20.1).
    location /api/measurement/ {
      set $upstream_measurement http://measurement-service:8000;
      proxy_pass $upstream_measurement;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
    location /api/report/ {
      set $upstream_report http://report-service:3000;
      proxy_pass $upstream_report;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
    location /api/auth/ {
      set $upstream_auth http://auth-service:8001;
      proxy_pass $upstream_auth;
      include /etc/nginx/conf.d/proxy_common.conf;
    }
  }
}
